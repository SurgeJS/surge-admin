<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        section {
            display: flex;
            gap: 10px;
        }

        div {
            background: #4244c9;
            width: 100px;
        }

        div:nth-child(4) {
            background: red;
            flex: 1;
        }
    </style>
</head>
<body>
<section>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
</section>
</body>
</html>
