<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .test {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            justify-items: start;
        }
    </style>
</head>
<body>
<div class="test">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <span>6</span>
</div>
</body>
</html>
