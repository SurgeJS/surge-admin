<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚动到目标元素</title>
    <style>
        .container {
            height: 1500px; /* 用于创建滚动效果 */
            background: linear-gradient(to bottom, #f0f0f0, #c0c0c0);
        }
        #target {
            margin-top: 1200px; /* 将目标元素放在较低的位置 */
            height: 200px;
            background: yellow;
            text-align: center;
            line-height: 200px;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>滚动到目标元素</h1>
    <button id="scrollButton">滚动到目标元素</button>
    <div id="target">目标元素</div>
</div>

<script>
    document.getElementById('scrollButton').addEventListener('click', function() {
        const targetElement = document.getElementById('target');
        targetElement.scrollIntoView({
            behavior: 'smooth', // 平滑滚动
            block: 'start' // 将元素对齐到视口顶部
        });
    });
</script>

</body>
</html>
